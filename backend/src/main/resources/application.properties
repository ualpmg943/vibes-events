spring.application.name=backend

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vibes_events}
spring.datasource.username=${DB_USERNAME:vibes_user}
spring.datasource.password=${DB_PASSWORD:vibes_pass}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET:default-jwt-secret-change-in-production}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

cors.allowed-origins=${CORS_ORIGINS:http://localhost:4321,http://localhost:80}

admin.email=${ADMIN_EMAIL:admin@vibeevents.com}
admin.password=${ADMIN_PASSWORD:admin123}
